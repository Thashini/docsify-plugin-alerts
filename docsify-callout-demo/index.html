<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docsify Callout Plugin Demo</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="stylesheet" href="docsify-callout.css">
  <style>
    /* Additional demo styles */
    .demo-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .demo-header h1 {
      margin: 0;
      font-size: 2.5rem;
    }
    .demo-header p {
      margin: 0.5rem 0 0;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Docsify configuration must be defined BEFORE loading docsify
    window.$docsify = {
      name: 'Docsify Callout Plugin',
      repo: '',
      loadSidebar: false,
      subMaxLevel: 2,
      homepage: 'README.md',
      // Plugin configuration
      callout: {
        types: {
          note: { icon: 'ℹ', title: 'NOTE', color: '#008080' },
          warning: { icon: '⚠', title: 'WARNING', color: '#c0392b' },
          tip: { icon: '★', title: 'FEATURE NOTICE', color: '#7d8c3f' },
          info: { icon: 'ℹ', title: 'INFO', color: '#3498db' }
        }
      }
    };
  </script>
  
  <!-- Docsify Callout Plugin - load AFTER config, BEFORE docsify -->
  <script src="docsify-callout.js"></script>
  
  <!-- Docsify - load LAST -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
